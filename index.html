<!DOCTYPE html>
<html lang="en" class="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

  <!-- PWA Settings -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="TIVE" />
  <meta name="theme-color" content="#09090b" />
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/icons/icon.svg">

  <title>TIVE | Performance Tracking</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --sat: env(safe-area-inset-top);
      --sab: env(safe-area-inset-bottom);
    }

    html,
    body {
      background-color: #09090b;
      color: #f4f4f5;
      height: 100%;
      overflow: hidden;
      overscroll-behavior-y: none;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      user-select: none;
    }

    button,
    input,
    select,
    textarea {
      touch-action: manipulation;
    }

    .gpu-accelerated {
      transform: translateZ(0);
      backface-visibility: hidden;
      will-change: transform, opacity;
    }

    #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    * {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    *::-webkit-scrollbar {
      display: none;
      width: 0;
      height: 0;
    }

    .pb-safe {
      padding-bottom: calc(1.5rem + var(--sab));
    }

    .pt-safe {
      padding-top: calc(1rem + var(--sat));
    }

    .px-safe {
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    input,
    select,
    textarea {
      font-size: 16px !important;
      user-select: text;
    }

    .glass-panel {
      background: rgba(24, 24, 27, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid rgba(255, 255, 255, 0.08);
    }
  </style>
  <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react/jsx-runtime": "https://esm.sh/react@18.2.0/jsx-runtime",
    "react-dom": "https://esm.sh/react-dom@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "lucide-react": "https://esm.sh/lucide-react@0.263.1?external=react",
    "recharts": "https://esm.sh/recharts@2.12.2?external=react,react-dom",
    "zustand": "https://esm.sh/zustand@4.3.8?external=react",
    "zustand/middleware": "https://esm.sh/zustand@4.3.8/middleware?external=react",
    "framer-motion": "https://esm.sh/framer-motion@10.12.16?external=react,react-dom",
    "clsx": "https://esm.sh/clsx@2.0.0",
    "tailwind-merge": "https://esm.sh/tailwind-merge@1.14.0",
    "axios": "https://esm.sh/axios@1.6.0",
    "idb-keyval": "https://esm.sh/idb-keyval@6.2.1",
    "react-window": "https://esm.sh/react-window@1.8.9?external=react,react-dom",
    "@supabase/supabase-js": "https://esm.sh/@supabase/supabase-js@2.38.4",
    "@dnd-kit/core": "https://esm.sh/@dnd-kit/core@6.0.8?external=react,react-dom",
    "@dnd-kit/sortable": "https://esm.sh/@dnd-kit/sortable@7.0.2?external=react,react-dom,@dnd-kit/core",
    "@dnd-kit/utilities": "https://esm.sh/@dnd-kit/utilities@3.2.1?external=react,react-dom",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "react/": "https://esm.sh/react@^19.2.3/",
    "zustand/": "https://esm.sh/zustand@^5.0.10/"
  }
}
</script>

</head>

<body>
  <div id="root"></div>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/service-worker.js')
          .then(reg => console.log('SW registered'))
          .catch(err => console.log('SW registration failed', err));
      });
    }
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
